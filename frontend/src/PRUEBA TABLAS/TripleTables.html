<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tres Taulak / Gelak - Kategoriak - Kokalekuak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 1rem; }
    .frame-row { display: flex; gap: 1rem; align-items: flex-start; }
    .frame-col { flex: 1 1 0; min-width: 260px; height: 80vh; border: 1px solid #e5e7eb; border-radius: .375rem; overflow: hidden; }
    .frame-col iframe { width: 100%; height: 100%; border: 0; }
    @media (max-width: 991px) {
      .frame-row { flex-direction: column; }
      .frame-col { height: 60vh; }
    }
    .page-title { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center page-title">
      <h1 class="m-0">Gelak · Kategoriak · Kokalekuak</h1>
      <small class="text-muted">Tres taula aldeka-aldean (iframes erabilita)</small>
    </div>

    <div class="frame-row">
      <div class="frame-col" title="Gelak">
        <iframe src="Gela.html" loading="lazy" aria-label="Gelak table"></iframe>
      </div>
      <div class="frame-col" title="Kategoriak">
        <iframe src="Kategoria.html" loading="lazy" aria-label="Kategoriak table"></iframe>
      </div>
      <div class="frame-col" title="Kokalekuak">
        <iframe src="Kokalekua.html" loading="lazy" aria-label="Kokalekuak table"></iframe>
      </div>
    </div>

    <div class="mt-3 text-muted">
      - Cada taula bere iframe-ean kargatzen da, DOM identitate gatazkak ekiditeko.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
