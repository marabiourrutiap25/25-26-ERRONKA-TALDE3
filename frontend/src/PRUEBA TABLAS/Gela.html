<!DOCTYPE html>
<!-- Página de pruebas para la tabla Gela -->
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <custom-header></custom-header>
  <main class="p-4">
    <div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">GELAK</h1>
        <div class="d-flex align-items-center">
          <input type="text" id="searchGelaInput" placeholder="Bilatu..." class="me-2">
          <button id="addGelaBtn" class="btn btn-custom btn-primary">+</button>
        </div>
      </div>
      <div class="card p-3">
        <div class="table-responsive">
          <table id="gelaTable" class="table table-hover table-striped align-middle">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Izena</th>
                <th>Taldea</th>
                <th>Editatu / Ezabatu</th>
              </tr>
            </thead>
            <tbody>
              <!-- Eduki dinamikoa -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="gelaModal" tabindex="-1" aria-labelledby="gelaModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="gelaModalLabel">Sortu / Editatu</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
        </div>
        <div class="modal-body">
          <form id="gelaForm">
            <input type="hidden" id="gelaId">
            <div class="mb-3">
              <label for="gelaIzena" class="form-label">Izena</label>
              <input type="text" class="form-control" id="gelaIzena" required>
            </div>
            <div class="mb-3">
              <label for="gelaTaldea" class="form-label">Taldea</label>
              <input type="text" class="form-control" id="gelaTaldea">
            </div>
            <div class="text-end">
              <button type="submit" class="btn btn-success">OK</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/Gela.js"></script>
  <script type="module" src="../components/Header.js"></script>
</body>
</html>
