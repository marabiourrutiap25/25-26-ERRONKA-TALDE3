<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <title>Hasiera | Erabiltzailea</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4">Ongi etorri!</h1>

        <div id="user-info" class="card p-3 shadow-sm" style="display:none;">
            <h4>Erabiltzailearen informazioa</h4>
            <ul class="list-group list-group-flush mb-3">
                <li class="list-group-item"><strong>NAN:</strong> <span id="nan"></span></li>
                <li class="list-group-item"><strong>Izena:</strong> <span id="izena"></span></li>
                <li class="list-group-item"><strong>Abizena:</strong> <span id="abizena"></span></li>
                <li class="list-group-item"><strong>Rola:</strong> <span id="rola"></span></li>
                <li class="list-group-item"><strong>API key:</strong> <span id="api_key"></span></li>
            </ul>

            <button id="logout-btn" class="btn btn-danger w-100">Itxi saioa</button>
        </div>

        <p id="error-msg" class="text-danger mt-4"></p>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        let apiKey = params.get("api_key") || localStorage.getItem("api_key");
        const userInfo = document.getElementById("user-info");
        const errorMsg = document.getElementById("error-msg");

        if (!apiKey) {
            errorMsg.textContent = "❌ Ez dago API key-rik. Hasi saioa berriro.";
            return;
        }

        fetch(`http://localhost/25-26-ERRONKA-TALDE3/backend/src/controller/getUserApiKey_rekin.php?api_key=${encodeURIComponent(apiKey)}`)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const user = data.user;
                    document.getElementById("nan").textContent = user.nan;
                    document.getElementById("izena").textContent = user.izena;
                    document.getElementById("abizena").textContent = user.abizena;
                    document.getElementById("rola").textContent = user.rola;
                    document.getElementById("api_key").textContent = user.api_key;
                    userInfo.style.display = "block";
                } else {
                    errorMsg.textContent = "❌ " + (data.message || "Errorea gertatu da.");
                }
            })
            .catch(err => {
                console.error("Errorea:", err);
                errorMsg.textContent = "⚠️ Zerbitzariarekin errorea gertatu da.";
            });

        const logoutBtn = document.getElementById("logout-btn");
        logoutBtn.addEventListener("click", () => {
            localStorage.removeItem("api_key");

            document.cookie = "api_key=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

            window.location.href = "../../public/index.html";
        });
    });
    </script>
</body>
</html>
