<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            /*background: url('ed8ab246-b9b7-4fdb-b448-b43c6409fe32.png') no-repeat center center fixed;*/
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Poppins", sans-serif;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .form-container img {
            width: 80px;
            margin-bottom: 15px;
        }

        .form-container h4 {
            margin-bottom: 25px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-control {
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .btn-primary {
            border-radius: 10px;
            background-color: #0b9a88;
            border: none;
        }

        .btn-primary:hover {
            background-color: #098c7a;
        }
    </style>
</head>
<body>
      <div class="form-container">
        <div class="text-center mb-3">
            <!--<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="usuario">-->
            <h5>Rola</h5>
        </div>

        <form id="perfil">
            <div class="row">
                <div class="col-md-6">
                    <label for="nombre" class="form-label">Izena</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Balioa" required>
                </div>
                <div class="col-md-6">
                    <label for="apellidos" class="form-label">Abizena</label>
                    <input type="text" id="apellidos" name="apellidos" class="form-control" placeholder="Balioa" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label for="usuario" class="form-label">Erabiltzailea</label>
                    <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Balioa" required>
                </div>
                <div class="col-md-6">
                    <label for="contrasena" class="form-label">Pasahitza</label>
                    <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="Balioa" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">Gorde</button>
        </form>
    </div>
    <script src="../js/profila.js"></script>
</body>
</html>
