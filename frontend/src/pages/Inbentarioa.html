<!DOCTYPE html>
<html lang="eu">

<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbentarioa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Inbentarioa.css">
</head>

<body>

  <header>
    <custom-header></custom-header>
  </header>

  <main class="p-4">
    <section class="container-fluid">

      <!-- Encabezado de la sección principal -->
      <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0" data-i18n="inventory-inbentarioa">INBENTARIOA</h1>

        <div class="d-flex align-items-center">
          <input type="text" id="searchInput" placeholder="Bilatu..." class="me-2" data-i18n-placeholder="search-placeholder-inbentarioa">
          <button id="addBtn" class="btn btn-custom">+</button>
        </div>
      </header>

      <!-- Tabla de inventario -->
      <article class="card p-3">
        <div class="table-responsive">
          <table id="inbentarioaTable" class="table table-hover table-striped align-middle">
            <thead class="table-light">
              <tr>
                <th data-i18n="etiketa-inbentarioa">Etiketa</th>
                <th data-i18n="equipment-inbentarioa">Ekipamendua</th>
                <th data-i18n="purchase-date-inbentarioa">Erosketa data</th>
                <th data-i18n="edit-delete-inbentarioa">Editatu / Ezabatu</th>
              </tr>
            </thead>
            <tbody>
              <!-- Filas generadas dinámicamente -->
            </tbody>
          </table>
        </div>
      </article>

    </section>
  </main>

  <!-- Modal de creación/edición -->
  <section aria-label="Inbentarioaren modala">
    <div class="modal fade" id="inbentarioaModal" tabindex="-1" aria-labelledby="inbentarioaModalLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <article class="modal-content">

          <header class="modal-header">
            <h5 class="modal-title" id="inbentarioaModalLabel" data-i18n="create-edit-inbentarioa-modal">Sortu / Editatu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
          </header>

          <div class="modal-body">
            <form id="inbentarioaForm">
              <input type="hidden" id="etiketaOld">

              <div class="row mb-3">
                <div class="col-6">
                  <label for="etiketa" class="form-label" data-i18n="etiketa-inbentarioa-modal">Etiketa</label>
                  <input type="text" class="form-control" id="etiketa" maxlength="10" required>
                </div>

                <div class="col-6">
                  <label for="idEkipamendu" class="form-label" data-i18n="equipment-inbentarioa-modal">Ekipamendua</label>
                  <select class="form-select" id="idEkipamendu" required>
                    <option value="" data-i18n="select-equipment-inbentarioa-modal">Aukeratu ekipamendua</option>
                  </select>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-6">
                  <label for="erosketaData" class="form-label" data-i18n="purchase-date-inbentarioa-modal">Erosketa data</label>
                  <input type="date" class="form-control" id="erosketaData" required>
                </div>
              </div>

              <div class="text-end">
                <button type="submit" class="btn btn-success" data-i18n="ok-inbentarioa-modal">OK</button>
              </div>
            </form>
          </div>

        </article>
      </div>
    </div>
  </section>

  <!-- Toast de notificaciones -->
  <aside class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <header class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle" data-i18n="title-toast-inbentarioa">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </header>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Función que detecta si se ha iniciado o no la sesión. -->
  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return decodeURIComponent(parts.pop().split(";").shift());
      return "";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const apiKey =
        localStorage.getItem("api_key") ||
        getCookie("api_key_session");
      if (!apiKey) {
        alert("❌ Ez da saiorik hasi. / No se ha iniciado sesión.");
        window.location.href = "../../index.html";
        return;
      }

    });
  </script>
  <script src="../script/Inbentarioa.js"></script>
  <script type="module" src="../components/Header.js"></script>
  <script type="module" src="../js/lang.js"></script>

</body>

</html>
