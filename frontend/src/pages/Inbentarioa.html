<!DOCTYPE html>
<html lang="eu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbentarioa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Inbentarioa.css">
</head>

<body>

  <header>
    <custom-header></custom-header>
  </header>

  <main class="p-4">
    <section class="container-fluid">

      <!-- Encabezado de la sección principal -->
      <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">INBENTARIOA</h1>

        <div class="d-flex align-items-center">
          <input type="text" id="searchInput" placeholder="Bilatu..." class="me-2">
          <button id="addBtn" class="btn btn-custom">+</button>
        </div>
      </header>

      <!-- Tabla de inventario -->
      <article class="card p-3">
        <div class="table-responsive">
          <table id="inbentarioaTable" class="table table-hover table-striped align-middle">
            <thead class="table-light">
              <tr>
                <th>Etiketa</th>
                <th>Ekipamendua</th>
                <th>Erosketa data</th>
                <th>Editatu / Ezabatu</th>
              </tr>
            </thead>
            <tbody>
              <!-- Filas generadas dinámicamente -->
            </tbody>
          </table>
        </div>
      </article>

    </section>
  </main>

  <!-- Modal de creación/edición -->
  <section aria-label="Inbentarioaren modala">
    <div class="modal fade" id="inbentarioaModal" tabindex="-1" aria-labelledby="inbentarioaModalLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <article class="modal-content">

          <header class="modal-header">
            <h5 class="modal-title" id="inbentarioaModalLabel">Sortu / Editatu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
          </header>

          <div class="modal-body">
            <form id="inbentarioaForm">
              <input type="hidden" id="etiketaOld">

              <div class="row mb-3">
                <div class="col-6">
                  <label for="etiketa" class="form-label">Etiketa</label>
                  <input type="text" class="form-control" id="etiketa" maxlength="10" required>
                </div>

                <div class="col-6">
                  <label for="idEkipamendu" class="form-label">Ekipamendua</label>
                  <select class="form-select" id="idEkipamendu" required>
                    <option value="">Aukeratu ekipamendua</option>
                  </select>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-6">
                  <label for="erosketaData" class="form-label">Erosketa data</label>
                  <input type="date" class="form-control" id="erosketaData" required>
                </div>
              </div>

              <div class="text-end">
                <button type="submit" class="btn btn-success">OK</button>
              </div>
            </form>
          </div>

        </article>
      </div>
    </div>
  </section>

  <!-- Toast de notificaciones -->
  <aside class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <header class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </header>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/Inbentarioa.js"></script>
  <script type="module" src="../components/Header.js"></script>

</body>

</html>
