<!DOCTYPE html>
<!-- Pantalla para listar y administrar usuarios -->
<html lang="eu">

<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erabiltzailea</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Erabiltzaileak.css">
</head>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const apiKey = localStorage.getItem("api_key") || getCookie("api_key_session");

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
      return "";
    }

    if (!apiKey) {
      alert("🚫 Ez duzu baimenik. Hasi saioa lehenik.");
      window.location.href = "../Login.html";
      return;
    }

    try {
      const response = await fetch(
        "http://localhost/25-26-ERRONKA-TALDE3/backend/src/controller/ErabiltzaileaController.php?action=getRole",
        {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + apiKey
          }
        }
      );

      const data = await response.json();

      // Comprobamos si rol === 'a' (admin)
      if (!data.success || data.rola !== "a") {
        alert("🚫 Ez duzu baimen nahikorik.");
        window.location.href = "../Login.html";
        return;
      }

      console.log("✅ Rol admin egiaztatuta:", data.rola);

    } catch (error) {
      console.error("Errorea rol egiaztatzean:", error);
      alert("Errorea gertatu da. Saiatu berriro.");
      window.location.href = "../Login.html";
    }
  });

  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      // La página se ha cargado desde la caché (volver atrás)
      window.location.reload();
    }
  });
</script>

<body>

  <header>
    <custom-header></custom-header>
  </header>

  <main class="p-4">
    <section class="container-fluid">

      <!-- Encabezado de la sección principal -->
      <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0" data-i18n="users-erabiltzaileak">ERABILTZAILEAK</h1>

        <div class="d-flex align-items-center">
          <input type="text" id="searchInput" placeholder="Bilatu..." class="me-2" data-i18n-placeholder="search-placeholder-erabiltzaileak">
          <button id="addBtn" class="btn btn-custom">+</button>
        </div>
      </header>

      <!-- Tabla de usuarios -->
      <article class="card p-3">
        <div class="table-responsive">
          <table id="erabiltzaileaTable" class="table table-hover table-striped align-middle">
            <thead class="table-light">
              <tr>
                <th>NAN</th>
                <th data-i18n="name-erabilztaileak">Izena</th>
                <th data-i18n="surname-erabiltzaileak">Abizena</th>
                <th data-i18n="user-erabiltzaileak">Erabiltzailea</th>
                <th data-i18n="password-erabiltzaileak">Pasahitza</th>
                <th data-i18n="role-erabiltzaileak">Rola</th>
                <th data-i18n="api-key-erabiltzaileak">API Key</th>
                <th data-i18n="edit-delete-erabiltzaileak">Editatu / Ezabatu</th>
              </tr>
            </thead>
            <tbody>
              <!-- Filas generadas dinámicamente -->
            </tbody>
          </table>
        </div>
      </article>

    </section>
  </main>

  <!-- Modal de creación/edición -->
  <section aria-label="Erabiltzaileen modala">
    <div class="modal fade" id="erabiltzaileaModal" tabindex="-1" aria-labelledby="erabiltzaileaModalLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <article class="modal-content">

          <header class="modal-header">
            <h5 class="modal-title" id="erabiltzaileaModalLabel" data-i18n="create-edit-erabiltzaileak-modal">Sortu / Editatu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
          </header>

          <div class="modal-body">
            <form id="erabiltzaileaForm">
              <input type="hidden" id="nanOld">

              <div class="row mb-3">
                <div class="col-6">
                  <label for="nan" class="form-label">NAN</label>
                  <input type="text" class="form-control" id="nan" maxlength="12" required>
                </div>
                <div class="col-6">
                  <label for="izena" class="form-label" data-i18n="name-erabilztaileak-modal">Izena</label>
                  <input type="text" class="form-control" id="izena" required>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-6">
                  <label for="abizena" class="form-label" data-i18n="surname-erabiltzaileak-modal">Abizena</label>
                  <input type="text" class="form-control" id="abizena" required>
                </div>
                <div class="col-6">
                  <label for="erabiltzailea" class="form-label" data-i18n="user-erabiltzaileak-modal">Erabiltzailea</label>
                  <input type="text" class="form-control" id="erabiltzailea" required>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-6">
                  <label for="pasahitza" class="form-label" data-i18n="password-erabiltzaileak-modal">Pasahitza</label>
                  <input type="password" class="form-control" id="pasahitza" placeholder="••••••••">
                </div>
                <div class="col-6">
                  <label for="rola" class="form-label" data-i18n="role-erabiltzaileak-modal">Rola</label>
                  <select class="form-select" id="rola" required>
                    <option value="" data-i18n="select-role-erabiltzaileak-modal">Aukeratu rola</option>
                    <option value="admin" data-i18n="admin-role-erabiltzaileak-modal">Administratzailea</option>
                    <option value="user" data-i18n="user-role-erabiltzaileak-modal">Erabiltzailea</option>
                  </select>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-12">
                  <label for="api_key" class="form-label" data-i18n="api-key-erabiltzaileak-modal">API Key</label>
                  <input type="text" class="form-control" id="api_key" placeholder="••••••••" readonly>
                </div>
              </div>

              <div class="text-end">
                <button type="submit" class="btn btn-success" data-i18n="ok-erabiltzaileak-modal">OK</button>
              </div>
            </form>
          </div>

        </article>
      </div>
    </div>
  </section>

  <!-- Toast de notificaciones -->
  <aside class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <header class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle" data-i18n="title-toast-erabiltzaileak">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </header>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Función que detecta si se ha iniciado o no la sesión. -->
  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return decodeURIComponent(parts.pop().split(";").shift());
      return "";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const apiKey =
        localStorage.getItem("api_key") ||
        getCookie("api_key_session");
      if (!apiKey) {
        alert("❌ Ez da saiorik hasi. / No se ha iniciado sesión.");
        window.location.href = "../../index.html";
        return;
      }

    });
  </script>
  <script src="../script/Erabiltzailea.js"></script>
  <script type="module" src="../components/Header.js"></script>
  <script src="../js/lang.js"></script>
</body>

</html>
