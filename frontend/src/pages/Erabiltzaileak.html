<!DOCTYPE html>
<html lang="eu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erabiltzailea</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Erabiltzaileak.css">
</head>

<body>

  <header>
    <custom-header></custom-header>
  </header>

  <main class="p-4">
    <section class="container-fluid">

      <!-- Encabezado de la sección principal -->
      <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">ERABILTZAILEAK</h1>

        <div class="d-flex align-items-center">
          <input type="text" id="searchInput" placeholder="Bilatu..." class="me-2">
          <button id="addBtn" class="btn btn-custom">+</button>
        </div>
      </header>

      <!-- Tabla de usuarios -->
      <article class="card p-3">
        <div class="table-responsive">
          <table id="erabiltzaileaTable" class="table table-hover table-striped align-middle">
            <thead class="table-light">
              <tr>
                <th>NAN</th>
                <th>Izena</th>
                <th>Abizena</th>
                <th>Erabiltzailea</th>
                <th>Pasahitza</th>
                <th>Rola</th>
                <th>API Key</th>
                <th>Editatu / Ezabatu</th>
              </tr>
            </thead>
            <tbody>
              <!-- Filas generadas dinámicamente -->
            </tbody>
          </table>
        </div>
      </article>

    </section>
  </main>

  <!-- Modal de creación/edición -->
  <section aria-label="Erabiltzaileen modala">
    <div class="modal fade" id="erabiltzaileaModal" tabindex="-1" aria-labelledby="erabiltzaileaModalLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <article class="modal-content">

          <header class="modal-header">
            <h5 class="modal-title" id="erabiltzaileaModalLabel">Sortu / Editatu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
          </header>

          <div class="modal-body">
            <form id="erabiltzaileaForm">
              <input type="hidden" id="nanOld">

              <div class="row mb-3">
                <div class="col-6">
                  <label for="nan" class="form-label">NAN</label>
                  <input type="text" class="form-control" id="nan" maxlength="12" required>
                </div>
                <div class="col-6">
                  <label for="izena" class="form-label">Izena</label>
                  <input type="text" class="form-control" id="izena" required>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-6">
                  <label for="abizena" class="form-label">Abizena</label>
                  <input type="text" class="form-control" id="abizena" required>
                </div>
                <div class="col-6">
                  <label for="erabiltzailea" class="form-label">Erabiltzailea</label>
                  <input type="text" class="form-control" id="erabiltzailea" required>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-6">
                  <label for="pasahitza" class="form-label">Pasahitza</label>
                  <input type="password" class="form-control" id="pasahitza" placeholder="••••••••">
                </div>
                <div class="col-6">
                  <label for="rola" class="form-label">Rola</label>
                  <select class="form-select" id="rola" required>
                    <option value="">Aukeratu rola</option>
                    <option value="admin">Administratzailea</option>
                    <option value="user">Erabiltzailea</option>
                  </select>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-12">
                  <label for="api_key" class="form-label">API Key</label>
                  <input type="text" class="form-control" id="api_key" placeholder="••••••••" readonly>
                </div>
              </div>

              <div class="text-end">
                <button type="submit" class="btn btn-success">OK</button>
              </div>
            </form>
          </div>

        </article>
      </div>
    </div>
  </section>

  <!-- Toast de notificaciones -->
  <aside class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <header class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </header>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/Erabiltzailea.js"></script>
  <script type="module" src="../components/Header.js"></script>
<script src="../js/lang.js"></script>
</body>

</html>
