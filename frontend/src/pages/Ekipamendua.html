<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekipamendua</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Ekipamendua.css">
</head>
<body>
  <custom-header></custom-header>
  <main class="p-4">
    <div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">EKIPAMENDUA</h1>
        <div class="d-flex align-items-center">
          <input type="text" id="searchInput" placeholder="Bilatu..." class="me-2">
          <button id="addBtn" class="btn btn-custom">+</button>
        </div>
      </div>

      <div class="card p-3">
        <div class="table-responsive">
          <table id="ekipTable" class="table table-hover table-striped align-middle">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Izena</th>
                <th>Deskribapena</th>
                <th>Marka</th>
                <th>Modelo</th>
                <th>Kategoria</th>
                <th>Stock</th>
                <th>Editatu / Ezabatu</th>
              </tr>
            </thead>
            <tbody>
              <!-- Filas generadas dinámicamente -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal reutilizable -->
  <div class="modal fade" id="ekipModal" tabindex="-1" aria-labelledby="ekipModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="ekipModalLabel">Sortu / Editatu</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
        </div>
        <div class="modal-body">
          <form id="ekipForm">
            <input type="hidden" id="ekipId">
            <div class="row mb-3">
              <div class="col-6">
                <label for="izena" class="form-label">Izena</label>
                <input type="text" class="form-control" id="izena" required>
              </div>
              <div class="col-6">
                <label for="deskribapena" class="form-label">Deskribapena</label>
                <input type="text" class="form-control" id="deskribapena">
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label for="marka" class="form-label">Marka</label>
                <input type="text" class="form-control" id="marka">
              </div>
              <div class="col-6">
                <label for="modelo" class="form-label">Modeloa</label>
                <input type="text" class="form-control" id="modelo">
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label for="kategoria" class="form-label">Kategoria</label>
                <select class="form-select" id="kategoria" required>
                  <option value="">Aukeratu kategoria</option>
                </select>
              </div>
              <div class="col-6">
                <label for="stock" class="form-label">Stock-a</label>
                <input type="number" class="form-control" id="stock" value="0">
              </div>
            </div>
            <div class="text-end">
              <button type="submit" class="btn btn-success">OK</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/Ekipamendua.js"></script>
  <script type="module" src="../components/Header.js"></script>
  <script src="../js/lang.js"></script>
</body>
</html>
