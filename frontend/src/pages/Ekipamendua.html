<!DOCTYPE html>
<!-- Ekipamenduei buruzko ikuspegi nagusia eta erregistroen CRUD -->
<html lang="eu">

<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekipamendua</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Ekipamendua.css">
</head>

<body>
  <header>
    <custom-header></custom-header>
  </header>

  <main class="p-4">
    <section class="container-fluid">

      <!-- Atal nagusiaren izenburua -->
      <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0" data-i18n="equipment-ekipamendua">EKIPAMENDUA</h1>

        <div class="d-flex align-items-center">
          <input type="text" id="searchInput" placeholder="Bilatu..." class="me-2" data-i18n-placeholder="search-placeholder-ekipamendua">
          <button id="addBtn" class="btn btn-custom">+</button>
        </div>
      </header>

      <!-- Taula nagusia -->
      <article class="card p-3">
        <div class="table-responsive">
          <table id="ekipTable" class="table table-hover table-striped align-middle">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th data-i18n="name-ekipamendua">Izena</th>
                <th data-i18n="description-ekipamendua">Deskribapena</th>
                <th data-i18n="brand-ekipamendua">Marka</th>
                <th data-i18n="model-ekipamendua">Modeloa</th>
                <th data-i18n="category-ekipamendua">Kategoria</th>
                <th data-i18n="stock-ekipamendua">Stock</th>
                <th data-i18n="edit-delete-ekipamendua">Editatu / Ezabatu</th>
              </tr>
            </thead>
            <tbody>
              <!-- Errenkadak dinamikoki sortzen dira -->
            </tbody>
          </table>
        </div>
      </article>

    </section>
  </main>

  <!-- Berrerabilgarria den modala -->
  <section aria-label="Ekipamendua sortu edo editatzeko modala">
    <div class="modal fade" id="ekipModal" tabindex="-1" aria-labelledby="ekipModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <article class="modal-content">
          <header class="modal-header">
            <h5 class="modal-title" id="ekipModalLabel" data-i18n="create-edit-ekipamendua-modal">Sortu/Editatu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
          </header>

          <div class="modal-body">
            <form id="ekipForm">
              <input type="hidden" id="ekipId">

              <div class="row mb-3">
                <div class="col-6">
                  <label for="izena" class="form-label" data-i18n="name-ekipamendua-modal">Izena</label>
                  <input type="text" class="form-control" id="izena" required>
                </div>

                <div class="col-6">
                  <label for="deskribapena" class="form-label" data-i18n="description-ekipamendua-modal">Deskribapena</label>
                  <input type="text" class="form-control" id="deskribapena">
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-6">
                  <label for="marka" class="form-label" data-i18n="brand-ekipamendua-modal">Marka</label>
                  <input type="text" class="form-control" id="marka">
                </div>

                <div class="col-6">
                  <label for="modelo" class="form-label" data-i18n="model-ekipamendua-modal">Modeloa</label>
                  <input type="text" class="form-control" id="modelo">
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-6">
                  <label for="kategoria" class="form-label" data-i18n="category-ekipamendua-modal">Kategoria</label>
                  <select class="form-select" id="kategoria" required>
                    <option value="">Aukeratu kategoria</option>
                  </select>
                </div>

                <div class="col-6">
                  <label for="stock" class="form-label" data-i18n="stock-ekipamendua-modal">Stock-a</label>
                  <input type="number" class="form-control" id="stock" value="0">
                </div>
              </div>

              <div class="text-end">
                <button type="submit" class="btn btn-success" data-i18n="ok-ekipamendua-modal">OK</button>
              </div>
            </form>
          </div>
        </article>
      </div>
    </div>
  </section>

  <!-- Jakinarazpenetarako toast -->
  <aside class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <header class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle" data-i18n="title-toast-ekipamendua">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </header>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </aside>

  <!-- Scriptak -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


  <!-- Saioa hasi den ala ez detektatzen duen funtzioa. -->
  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return decodeURIComponent(parts.pop().split(";").shift());
      return "";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const apiKey =
        localStorage.getItem("api_key") ||
        getCookie("api_key_session");
      if (!apiKey) {
        alert("❌ Ez da saiorik hasi. / No se ha iniciado sesión.");
        window.location.href = "../../index.html";
        return;
      }

    });
  </script>







  <script src="../script/Ekipamendua.js"></script>
  <script type="module" src="../components/Header.js"></script>
  <script type="module" src="../js/lang.js"></script>
</body>

</html>
