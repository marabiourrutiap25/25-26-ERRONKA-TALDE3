<!DOCTYPE html>
<!-- Panel de control con accesos rápidos y métricas -->
<html lang="eu">

<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Kudeaketa.css">
</head>

<body>

  <header>
    <custom-header></custom-header>
  </header>

  <main class="p-4">
    <section class="container-fluid">
      <div class="row">

        <!-- ====================== -->
        <!--       GELA SECTION     -->
        <!-- ====================== -->
        <section class="col-lg-4 col-section">

          <article class="card p-3">

            <header class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="m-0" data-i18n="rooms-kudeaketa">GELAK</h2>

              <div class="d-flex align-items-center">
                <input type="text" id="searchGelaInput" placeholder="Bilatu..." class="me-2 table-search-input" data-i18n-placeholder="search-placeholder-kudeaketa">
                <button id="addGelaBtn" class="btn btn-custom btn-primary btn-sm">+</button>
              </div>
            </header>

            <div class="table-responsive">
              <table id="gelaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th data-i18n="id-gela-kudeaketa">ID</th>
                    <th data-i18n="name-gela-kudeaketa">Izena</th>
                    <th data-i18n="team-gela-kudeaketa">Taldea</th>
                    <th data-i18n="edit-delete-gela-kudeaketa">Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody><!-- dinamikoa --></tbody>
              </table>
            </div>

          </article>

          <!-- Modal Gela -->
          <section aria-label="Gela editatzeko modala">
            <div class="modal fade" id="gelaModal" tabindex="-1" aria-labelledby="gelaModalLabel" aria-hidden="true">
              <div class="modal-dialog">
                <article class="modal-content">

                  <header class="modal-header">
                    <h5 class="modal-title" id="gelaModalLabel" data-i18n="create-edit-gela-kudeaketa-modal">Sortu / Editatu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
                  </header>

                  <div class="modal-body">
                    <form id="gelaForm">
                      <input type="hidden" id="gelaId">

                      <div class="mb-3">
                        <label for="gelaIzena" class="form-label" data-i18n="name-gela-kudeaketa-modal">Izena</label>
                        <input type="text" class="form-control" id="gelaIzena" required>
                      </div>

                      <div class="mb-3">
                        <label for="gelaTaldea" class="form-label" data-i18n="team-gela-kudeaketa-modal">Taldea</label>
                        <input type="text" class="form-control" id="gelaTaldea">
                      </div>

                      <div class="text-end">
                        <button type="submit" class="btn btn-success" data-i18n="ok-gela-kudeaketa-modal">OK</button>
                      </div>
                    </form>
                  </div>

                </article>
              </div>
            </div>
          </section>

        </section>

        <!-- ====================== -->
        <!--    KATEGORIA SECTION   -->
        <!-- ====================== -->
        <section class="col-lg-4 col-section">

          <article class="card p-3">

            <header class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="m-0" data-i18n="categories-kudeaketa">KATEGORIAK</h2>

              <div class="d-flex align-items-center">
                <input type="text" id="searchKategoriaInput" placeholder="Bilatu..." class="me-2 table-search-input" data-i18n-placeholder="search-placeholder-kudeaketa">
                <button id="addKategoriaBtn" class="btn btn-custom btn-primary btn-sm">+</button>
              </div>
            </header>

            <div class="table-responsive">
              <table id="kategoriaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th data-i18n="id-kategoria-kudeaketa">ID</th>
                    <th data-i18n="name-kategoria-kudeaketa">Izena</th>
                    <th data-i18n="edit-delete-kategoria-kudeaketa">Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody><!-- dinamikoa --></tbody>
              </table>
            </div>

          </article>

          <!-- Modal Kategoria -->
          <section aria-label="Kategoria editatzeko modala">
            <div class="modal fade" id="kategoriaModal" tabindex="-1" aria-labelledby="kategoriaModalLabel"
              aria-hidden="true">
              <div class="modal-dialog">
                <article class="modal-content">

                  <header class="modal-header">
                    <h5 class="modal-title" id="kategoriaModalLabel" data-i18n="create-edit-kategoria-kudeaketa-modal">Sortu / Editatu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
                  </header>

                  <div class="modal-body">
                    <form id="kategoriaForm">
                      <input type="hidden" id="kategoriaId">

                      <div class="mb-3">
                        <label for="kategoriaIzena" class="form-label" data-i18n="name-kategoria-kudeaketa-modal">Izena</label>
                        <input type="text" class="form-control" id="kategoriaIzena" required>
                      </div>

                      <div class="text-end">
                        <button type="submit" class="btn btn-success" data-i18n="ok-kategoria-kudeaketa-modal">OK</button>
                      </div>
                    </form>
                  </div>

                </article>
              </div>
            </div>
          </section>

        </section>

        <!-- ======================= -->
        <!--   KOKALEKUA SECTION     -->
        <!-- ======================= -->
        <section class="col-lg-4 col-section">

          <article class="card p-3">

            <header class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="m-0" data-i18n="locations-kudeaketa">KOKALEKUAK</h2>

              <div class="d-flex align-items-center">
                <input type="text" id="searchKokalekuaInput" placeholder="Bilatu..." class="me-2 table-search-input" data-i18n-placeholder="search-placeholder-kudeaketa">
                <button id="addKokalekuaBtn" class="btn btn-custom btn-primary btn-sm">+</button>
              </div>
            </header>

            <div class="table-responsive">
              <table id="kokalekuaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th data-i18n="etiketa-kokalekua-kudeaketa">Etiketa</th>
                    <th data-i18n="room-kokalekua-kudeaketa">Gela</th>
                    <th data-i18n="start-kokalekua-kudeaketa">Hasiera</th>
                    <th data-i18n="end-kokalekua-kudeaketa">Amaiera</th>
                    <th data-i18n="edit-delete-kokalekua-kudeaketa">Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody><!-- dinamikoa --></tbody>
              </table>
            </div>

          </article>

          <!-- Modal Kokalekua -->
          <section aria-label="Kokalekua editatzeko modala">
            <div class="modal fade" id="kokalekuaModal" tabindex="-1" aria-labelledby="kokalekuaModalLabel"
              aria-hidden="true">
              <div class="modal-dialog">
                <article class="modal-content">

                  <header class="modal-header">
                    <h5 class="modal-title" id="kokalekuaModalLabel" data-i18n="create-edit-kokalekua-kudeaketa-modal">Sortu / Editatu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
                  </header>

                  <div class="modal-body">
                    <form id="kokalekuaForm">
                      <input type="hidden" id="kokalekuaEtiketaOriginal">
                      <input type="hidden" id="kokalekuaHasieraDataOriginal">

                      <div class="mb-3">
                        <label for="kokalekuaEtiketa" class="form-label" data-i18n="name-label-kokalekua-kudeaketa-modal">Izena (etiketa)</label>
                        <select id="kokalekuaEtiketa" class="form-select" required></select>
                      </div>

                      <div class="mb-3">
                        <label for="kokalekuaGela" class="form-label" data-i18n="room-kokalekua-kudeaketa-modal">Gela</label>
                        <select id="kokalekuaGela" class="form-select" required></select>
                      </div>

                      <div class="mb-3">
                        <label for="kokalekuaHasieraData" class="form-label" data-i18n="start-date-kokalekua-kudeaketa-modal">Hasiera Data</label>
                        <input type="date" class="form-control" id="kokalekuaHasieraData" required>
                      </div>

                      <div class="mb-3">
                        <label for="kokalekuaAmaieraData" class="form-label" data-i18n="end-date-kokalekua-kudeaketa-modal">Amaiera Data</label>
                        <input type="date" class="form-control" id="kokalekuaAmaieraData">
                      </div>

                      <div class="text-end">
                        <button type="submit" class="btn btn-success" data-i18n="ok-kokalekua-kudeaketa-modal">OK</button>
                      </div>
                    </form>
                  </div>

                </article>
              </div>
            </div>
          </section>

        </section>

      </div>
    </section>
  </main>

  <!-- Toast -->
  <aside class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <header class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle" data-i18n="title-toast-kudeaketa">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </header>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Función que detecta si se ha iniciado o no la sesión. -->
  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return decodeURIComponent(parts.pop().split(";").shift());
      return "";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const apiKey =
        localStorage.getItem("api_key") ||
        getCookie("api_key_session");
      if (!apiKey) {
        alert("❌ Ez da saiorik hasi. / No se ha iniciado sesión.");
        window.location.href = "../../index.html";
        return;
      }

    });
  </script>
  <script src="../script/Gela.js"></script>
  <script src="../script/Kategoria.js"></script>
  <script src="../script/kokalekua.js"></script>
  <script type="module" src="../components/Header.js"></script>
  <script src="../js/lang.js"></script>

</body>

</html>
