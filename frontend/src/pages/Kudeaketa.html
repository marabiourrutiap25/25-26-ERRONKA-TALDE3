<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kudeaketa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <custom-header></custom-header>
  <main class="p-4">
    <div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">KUDEAKETA</h1>
      </div>
      <div class="row g-4">
        <div class="col-lg-4 col-md-6 col-12">
          <div class="section-title">KATEGORIAK</div>
          <div class="d-flex justify-content-between align-items-center mb-2">
            <input type="text" id="searchKategoriaInput" placeholder="Bilatu..." class="me-2">
            <button id="addKategoriaBtn" class="btn btn-custom">+</button>
          </div>
          <div class="card p-3">
            <div class="table-responsive">
              <table id="kategoriaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Izena</th>
                    <th>Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Dinamikoa -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-lg-4 col-md-6 col-12">
          <div class="section-title">KOKALEKUAK</div>
          <div class="d-flex justify-content-between align-items-center mb-2">
            <input type="text" id="searchKokalekuaInput" placeholder="Bilatu..." class="me-2">
            <button id="addKokalekuaBtn" class="btn btn-custom">+</button>
          </div>
          <div class="card p-3">
            <div class="table-responsive">
              <table id="kokalekuaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Etiketa</th>
                    <th>Gela</th>
                    <th>Hasiera data</th>
                    <th>Amaiera data</th>
                    <th>Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Dinamikoa -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-lg-4 col-md-12 col-12">
          <div class="section-title">GELAK</div>
          <div class="d-flex justify-content-between align-items-center mb-2">
            <input type="text" id="searchGelaInput" placeholder="Bilatu..." class="me-2">
            <button id="addGelaBtn" class="btn btn-custom">+</button>
          </div>
          <div class="card p-3">
            <div class="table-responsive">
              <table id="gelaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Izena</th>
                    <th>Taldea</th>
                    <th>Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Dinamikoa -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <!-- Modals -->
  <!-- Kategoria Modal -->
  <div class="modal fade" id="kategoriaModal" tabindex="-1" aria-labelledby="kategoriaModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="kategoriaModalLabel">Sortu / Editatu</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
        </div>
        <div class="modal-body">
          <form id="kategoriaForm">
            <input type="hidden" id="kategoriaId">
            <div class="mb-3">
              <label for="kategoriaIzena" class="form-label">Izena</label>
              <input type="text" class="form-control" id="kategoriaIzena" required>
            </div>
            <div class="text-end">
              <button type="submit" class="btn btn-success">OK</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <!-- Kokalekua Modal -->
  <div class="modal fade" id="kokalekuaModal" tabindex="-1" aria-labelledby="kokalekuaModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="kokalekuaModalLabel">Sortu / Editatu</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
        </div>
        <div class="modal-body">
          <form id="kokalekuaForm">
            <input type="hidden" id="kokalekuaEtiketaOld">
            <input type="hidden" id="hasieraDataOld">
            <div class="mb-3">
              <label for="kokalekuaEtiketa" class="form-label">Etiketa</label>
              <input type="text" class="form-control" id="kokalekuaEtiketa" maxlength="10" required>
            </div>
            <div class="mb-3">
              <label for="idGela" class="form-label">Gela ID</label>
              <select class="form-select" id="idGela" required>
                <option value="">Aukeratu gela</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="hasieraData" class="form-label">Hasiera data</label>
              <input type="date" class="form-control" id="hasieraData" required>
            </div>
            <div class="mb-3">
              <label for="amaieraData" class="form-label">Amaiera data</label>
              <input type="date" class="form-control" id="amaieraData">
            </div>
            <div class="text-end">
              <button type="submit" class="btn btn-success">OK</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <!-- Gela Modal -->
  <div class="modal fade" id="gelaModal" tabindex="-1" aria-labelledby="gelaModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="gelaModalLabel">Sortu / Editatu</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
        </div>
        <div class="modal-body">
          <form id="gelaForm">
            <input type="hidden" id="gelaId">
            <div class="mb-3">
              <label for="gelaIzena" class="form-label">Izena</label>
              <input type="text" class="form-control" id="gelaIzena" required>
            </div>
            <div class="mb-3">
              <label for="gelaTaldea" class="form-label">Taldea</label>
              <input type="text" class="form-control" id="gelaTaldea">
            </div>
            <div class="text-end">
              <button type="submit" class="btn btn-success">OK</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <!-- Toast Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>
  <link rel="stylesheet" href="../css/Kudeaketa.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/Kategoria.js"></script>
  <script src="../script/Kokalekua.js"></script>
  <script src="../script/Gela.js"></script>
  <script type="module" src="../components/Header.js"></script>
</body>
</html>
