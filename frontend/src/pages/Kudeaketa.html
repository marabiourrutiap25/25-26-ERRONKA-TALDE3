<!DOCTYPE html>
<html lang="eu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Kudeaketa.css">

  <style>
    body {
      padding: 1rem;
    }

    .col-section {
      padding: 0 0.5rem;
    }

    .card {
      height: calc(100vh - 220px);
      overflow: auto;
    }

    @media (max-width: 991px) {
      .card {
        height: auto;
      }
    }
  </style>
</head>

<body>

  <header>
    <custom-header></custom-header>
  </header>

  <main class="p-4">
    <section class="container-fluid">
      <div class="row">

        <!-- ====================== -->
        <!--       GELA SECTION     -->
        <!-- ====================== -->
        <section class="col-lg-4 col-section">

          <article class="card p-3">

            <header class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="m-0">GELAK</h2>

              <div class="d-flex align-items-center">
                <input type="text" id="searchGelaInput" placeholder="Bilatu..." class="me-2 table-search-input">
                <button id="addGelaBtn" class="btn btn-custom btn-primary btn-sm">+</button>
              </div>
            </header>

            <div class="table-responsive">
              <table id="gelaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Izena</th>
                    <th>Taldea</th>
                    <th>Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody><!-- dinamikoa --></tbody>
              </table>
            </div>

          </article>

          <!-- Modal Gela -->
          <section aria-label="Gela editatzeko modala">
            <div class="modal fade" id="gelaModal" tabindex="-1" aria-labelledby="gelaModalLabel" aria-hidden="true">
              <div class="modal-dialog">
                <article class="modal-content">

                  <header class="modal-header">
                    <h5 class="modal-title" id="gelaModalLabel">Sortu / Editatu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
                  </header>

                  <div class="modal-body">
                    <form id="gelaForm">
                      <input type="hidden" id="gelaId">

                      <div class="mb-3">
                        <label for="gelaIzena" class="form-label">Izena</label>
                        <input type="text" class="form-control" id="gelaIzena" required>
                      </div>

                      <div class="mb-3">
                        <label for="gelaTaldea" class="form-label">Taldea</label>
                        <input type="text" class="form-control" id="gelaTaldea">
                      </div>

                      <div class="text-end">
                        <button type="submit" class="btn btn-success">OK</button>
                      </div>
                    </form>
                  </div>

                </article>
              </div>
            </div>
          </section>

        </section>

        <!-- ====================== -->
        <!--    KATEGORIA SECTION   -->
        <!-- ====================== -->
        <section class="col-lg-4 col-section">

          <article class="card p-3">

            <header class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="m-0">KATEGORIAK</h2>

              <div class="d-flex align-items-center">
                <input type="text" id="searchKategoriaInput" placeholder="Bilatu..." class="me-2 table-search-input">
                <button id="addKategoriaBtn" class="btn btn-custom btn-primary btn-sm">+</button>
              </div>
            </header>

            <div class="table-responsive">
              <table id="kategoriaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Izena</th>
                    <th>Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody><!-- dinamikoa --></tbody>
              </table>
            </div>

          </article>

          <!-- Modal Kategoria -->
          <section aria-label="Kategoria editatzeko modala">
            <div class="modal fade" id="kategoriaModal" tabindex="-1" aria-labelledby="kategoriaModalLabel"
              aria-hidden="true">
              <div class="modal-dialog">
                <article class="modal-content">

                  <header class="modal-header">
                    <h5 class="modal-title" id="kategoriaModalLabel">Sortu / Editatu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
                  </header>

                  <div class="modal-body">
                    <form id="kategoriaForm">
                      <input type="hidden" id="kategoriaId">

                      <div class="mb-3">
                        <label for="kategoriaIzena" class="form-label">Izena</label>
                        <input type="text" class="form-control" id="kategoriaIzena" required>
                      </div>

                      <div class="text-end">
                        <button type="submit" class="btn btn-success">OK</button>
                      </div>
                    </form>
                  </div>

                </article>
              </div>
            </div>
          </section>

        </section>

        <!-- ======================= -->
        <!--   KOKALEKUA SECTION     -->
        <!-- ======================= -->
        <section class="col-lg-4 col-section">

          <article class="card p-3">

            <header class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="m-0">KOKALEKUAK</h2>

              <div class="d-flex align-items-center">
                <input type="text" id="searchKokalekuaInput" placeholder="Bilatu..." class="me-2 table-search-input">
                <button id="addKokalekuaBtn" class="btn btn-custom btn-primary btn-sm">+</button>
              </div>
            </header>

            <div class="table-responsive">
              <table id="kokalekuaTable" class="table table-hover table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Etiketa</th>
                    <th>Gela</th>
                    <th>Hasiera</th>
                    <th>Amaiera</th>
                    <th>Editatu / Ezabatu</th>
                  </tr>
                </thead>
                <tbody><!-- dinamikoa --></tbody>
              </table>
            </div>

          </article>

          <!-- Modal Kokalekua -->
          <section aria-label="Kokalekua editatzeko modala">
            <div class="modal fade" id="kokalekuaModal" tabindex="-1" aria-labelledby="kokalekuaModalLabel"
              aria-hidden="true">
              <div class="modal-dialog">
                <article class="modal-content">

                  <header class="modal-header">
                    <h5 class="modal-title" id="kokalekuaModalLabel">Sortu / Editatu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Itxi"></button>
                  </header>

                  <div class="modal-body">
                    <form id="kokalekuaForm">
                      <input type="hidden" id="kokalekuaEtiketaOriginal">
                      <input type="hidden" id="kokalekuaHasieraDataOriginal">

                      <div class="mb-3">
                        <label for="kokalekuaEtiketa" class="form-label">Izena (etiketa)</label>
                        <select id="kokalekuaEtiketa" class="form-select" required></select>
                      </div>

                      <div class="mb-3">
                        <label for="kokalekuaGela" class="form-label">Gela</label>
                        <select id="kokalekuaGela" class="form-select" required></select>
                      </div>

                      <div class="mb-3">
                        <label for="kokalekuaHasieraData" class="form-label">Hasiera Data</label>
                        <input type="date" class="form-control" id="kokalekuaHasieraData" required>
                      </div>

                      <div class="mb-3">
                        <label for="kokalekuaAmaieraData" class="form-label">Amaiera Data</label>
                        <input type="date" class="form-control" id="kokalekuaAmaieraData">
                      </div>

                      <div class="text-end">
                        <button type="submit" class="btn btn-success">OK</button>
                      </div>
                    </form>
                  </div>

                </article>
              </div>
            </div>
          </section>

        </section>

      </div>
    </section>
  </main>

  <!-- Toast -->
  <aside class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <header class="toast-header">
        <div id="toastIcon" class="me-2">🔔</div>
        <strong class="me-auto" id="toastTitle">Notifikazioa</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </header>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/Gela.js"></script>
  <script src="../script/Kategoria.js"></script>
  <script src="../script/kokalekua.js"></script>
  <script type="module" src="../components/Header.js"></script>

</body>

</html>
