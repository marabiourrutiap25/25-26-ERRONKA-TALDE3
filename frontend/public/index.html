<!DOCTYPE html>
<html lang="eu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/png" href="../src/assets/img/logo_horizontal_principal.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css">
</head>

<body class="fondo">

    <nav id="lang-popup" class="d-flex gap-2 p-2 rounded">
        <button type="button" class="lang-btn btn btn-outline-primary btn-sm" data-lang="eus">EUS</button>
        <button type="button" class="lang-btn btn btn-outline-primary btn-sm" data-lang="esp">ESP</button>
        <button type="button" class="lang-btn btn btn-outline-primary btn-sm" data-lang="eng">ENG</button>
    </nav>

    <main class="d-flex justify-content-center align-items-center vh-100">
        <section class="login-popup text-center p-4 rounded">
            <header class="text-center mb-3">
                <figure class="mb-2">
                    <img src="../src/assets/img/logo_horizontal_principal.png" alt="Logo" width="350">
                </figure>
            </header>

            <form id="loginForm">
                <label for="usuario" class="form-label text-start w-100" data-i18n="username-label">
                    Erabiltzailea:
                </label>
                <input type="text" id="usuario" class="form-control mb-3" data-i18n-placeholder="username-placeholder">

                <label for="password" class="form-label text-start w-100" data-i18n="password-label">
                    Pasahitza:
                </label>
                <input type="password" id="password" class="form-control mb-3" data-i18n-placeholder="password-placeholder">

                <button type="submit" class="submit-btn btn btn-primary w-100 mb-2" data-i18n="submit">Sartu</button>

                <button id="continueBtn" type="button" class="btn btn-outline-success w-100" style="display:none;">
                    🔑 Jarraitu saioa (este botón aparece si hay api key en la cookie, y no está traducido)
                </button>

                <p id="error-template" data-i18n="errore_mezua" hidden></p>
            </form>

            <footer>
                <p class="mt-3 text-muted small" data-i18n="contact">
                    Ez duzu konturik? Jarri harremanetarako: adibide@fpsanturtzilh.eus
                </p>
            </footer>
        </section>
    </main>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("loginForm");
    const usuarioInput = document.getElementById("usuario");
    const passwordInput = document.getElementById("password");
    const continueBtn = document.getElementById("continueBtn");

    const messageDiv = document.createElement("p");
    messageDiv.id = "login-message";
    messageDiv.classList.add("mt-3", "fw-bold");
    form.appendChild(messageDiv);

    const savedApiKey = localStorage.getItem("api_key");
    if (savedApiKey) {
        console.log("🔹 API key encontrada, mostrando botón de continuar...");
        continueBtn.style.display = "block";

        continueBtn.addEventListener("click", () => {
            const encoded = encodeURIComponent(savedApiKey);
            window.location.href = `../src/pages/Pagina_Prueba.html?api_key=${encoded}`;
        });
    }

    form.addEventListener("submit", (event) => {
        event.preventDefault();
        messageDiv.textContent = "";
        messageDiv.style.color = "";

        const jsonData = {
            erabiltzailea: usuarioInput.value.trim(),
            pasahitza: passwordInput.value.trim()
        };

        if (!jsonData.erabiltzailea || !jsonData.pasahitza) {
            messageDiv.textContent = "⚠️ Datuak falta dira.";
            messageDiv.style.color = "red";
            return;
        }

        fetch("http://localhost/25-26-ERRONKA-TALDE3/backend/src/controller/login_controller.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(jsonData)
        })
        .then(response => response.json())
        .then(data => {
            console.log("🔹 Respuesta del servidor:", data);

            if (data.success && data.user.api_key) {
                console.log("✅ Login correcto, guardando API key...");
                localStorage.setItem("api_key", data.user.api_key);

                const apiKey = encodeURIComponent(data.user.api_key);
                window.location.href = `../src/pages/Pagina_Prueba.html?api_key=${apiKey}`;
            } else {
                console.warn("❌ Login error:", data.message);
                const errorTemplate = document.getElementById("error-template");
                const translatedError = errorTemplate ? errorTemplate.textContent.trim() : "Errorea gertatu da.";
                messageDiv.textContent = `❌ ${translatedError}`;
                messageDiv.style.color = "red";
            }
        })
        .catch(error => {
            console.error("⚠️ Logina ERROREA (fetch):", error);
            messageDiv.textContent = "⚠️ Zerbitzariarekin errorea gertatu da.";
            messageDiv.style.color = "red";
        });
    });
});
</script>

<script src="../src/js/lang.js"></script>
</body>
</html>
