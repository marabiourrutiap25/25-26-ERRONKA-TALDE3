<!DOCTYPE html>
<html lang="eu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/png" href="../src/assets/img/logo_horizontal_principal.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body class="fondo">

    <nav id="lang-popup" class="d-flex gap-2 p-2 rounded">
        <button type="button" class="lang-btn btn btn-outline-primary btn-sm" data-lang="eus">EUS</button>
        <button type="button" class="lang-btn btn btn-outline-primary btn-sm" data-lang="esp">ESP</button>
        <button type="button" class="lang-btn btn btn-outline-primary btn-sm" data-lang="eng">ENG</button>
    </nav>

    <main class="d-flex justify-content-center align-items-center vh-100">
        <section class="login-popup text-center p-4 rounded">
            <header class="text-center mb-3">
                <figure class="mb-2">
                    <img src="src/assets/img/logo_horizontal_principal.png" alt="Logo" width="350">
                </figure>
            </header>

            <form id="loginForm">
                <label for="usuario" class="form-label text-start w-100" data-i18n="username-label">
                    Erabiltzailea:
                </label>
                <input type="text" id="usuario" class="form-control mb-3" data-i18n-placeholder="username-placeholder">

                <label for="password" class="form-label text-start w-100" data-i18n="password-label">
                    Pasahitza:
                </label>
                <input type="password" id="password" class="form-control mb-3"
                    data-i18n-placeholder="password-placeholder">

                <fieldset class="form-check mb-3 text-start">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" for="remember" data-i18n="remember">
                        Nire kontua gogoratu
                    </label>
                </fieldset>

                <button type="submit" class="submit-btn btn btn-primary w-100 mb-2" data-i18n="submit">Sartu</button>

                <p id="error-template" data-i18n="errore_mezua" hidden></p>
            </form>

            <footer>
                <p class="mt-3 text-muted small" data-i18n="contact">
                    Ez duzu konturik? Jarri harremanetarako: adibide@fpsanturtzilh.eus
                </p>
            </footer>
        </section>
    </main>

    <script>
        // ===== COOKIE FUNCTIONS =====
        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = `${name}=${encodeURIComponent(value)}; ${expires}; path=/`;
        }

        function setSessionCookie(name, value) {
            // Cookie temporal: sin fecha de expiración (se borra al cerrar el navegador)
            document.cookie = `${name}=${encodeURIComponent(value)}; path=/`;
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
            return "";
        }

        function deleteCookie(name) {
            document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("loginForm");
            const usuarioInput = document.getElementById("usuario");
            const passwordInput = document.getElementById("password");
            const rememberCheckbox = document.getElementById("remember");

            const messageDiv = document.createElement("p");
            messageDiv.id = "login-message";
            messageDiv.classList.add("mt-3", "fw-bold");
            form.appendChild(messageDiv);

            // Verificar si hay una sesión activa (cookie de sesión o localStorage)
            const savedApiKey = localStorage.getItem("api_key") || getCookie("api_key_session");
            if (savedApiKey) {
                const encoded = encodeURIComponent(savedApiKey);
                window.location.href = `../src/pages/Kudeaketa.html`;
            }

            // Cargar credenciales guardadas si existe la cookie
            const savedUser = getCookie("usuario");
            const savedPass = getCookie("password");
            if (savedUser && savedPass) {
                usuarioInput.value = savedUser;
                passwordInput.value = savedPass;
                rememberCheckbox.checked = true;
            }

            form.addEventListener("submit", (event) => {
                event.preventDefault();
                messageDiv.textContent = "";
                messageDiv.style.color = "";

                const jsonData = {
                    erabiltzailea: usuarioInput.value.trim(),
                    pasahitza: passwordInput.value.trim()
                };

                if (!jsonData.erabiltzailea || !jsonData.pasahitza) {
                    messageDiv.textContent = "⚠️ Datuak falta dira.";
                    messageDiv.style.color = "red";
                    return;
                }

                // Gestionar cookies según el checkbox
                if (rememberCheckbox.checked) {
                    setCookie("usuario", usuarioInput.value.trim(), 7);
                    setCookie("password", usuarioInput.value.trim(), 7);
                } else {
                    deleteCookie("usuario");
                    deleteCookie("password");
                }

                fetch("https://www.zerbitzari3.edu/25-26-ERRONKA-TALDE3/backend/src/controller/loginController.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(jsonData)
                })
                    .then(response => response.json())
                    .then(data => {
                        console.log("🔹 Respuesta del servidor:", data);

                        if (data.success && data.user.api_key) {
                            console.log("✅ Login correcto");

                            // SIEMPRE guardar api_key en cookie de sesión (temporal)
                            setSessionCookie("api_key_session", data.user.api_key);
                            console.log("🍪 API key guardada en cookie de sesión temporal");

                            // Si marca "Recordar", también guardar en localStorage
                            if (rememberCheckbox.checked) {
                                localStorage.setItem("api_key", data.user.api_key);
                                console.log("💾 API key también guardada en localStorage");
                            }

                            const apiKey = encodeURIComponent(data.user.api_key);
                            window.location.href = `src/pages/kudeaketa.html`;
                        } else {
                            console.warn("❌ Login error:", data.message);
                            const errorTemplate = document.getElementById("error-template");
                            const translatedError = errorTemplate ? errorTemplate.textContent.trim() : "Errorea gertatu da.";
                            messageDiv.textContent = `❌ ${translatedError}`;
                            messageDiv.style.color = "red";
                        }
                    })
                    .catch(error => {
                        console.error("⚠️ Logina ERROREA (fetch):", error);
                        messageDiv.textContent = "⚠️ Zerbitzariarekin errorea gertatu da.";
                        messageDiv.style.color = "red";
                    });
            });
        });
    </script>

    <script src="../src/js/lang.js"></script>
</body>

</html>
